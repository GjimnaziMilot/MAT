<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gjimnazi Milot - ID e Maturës</title>

    <link rel="stylesheet" href="html.css">

</head>
<body>

<div class="container">

    <h1>Gjimnazi Milot</h1>

    <div class="subtitle">
        Kontrollo ID e Maturës Shtetërore 2026
    </div>

    <label>Emri</label>
    <input type="text" id="emri" placeholder="Shkruaj emrin">

    <label>Mbiemri</label>
    <input type="text" id="mbiemri" placeholder="Shkruaj mbiemrin">

    <label>ID e kartës së identitetit</label>
    <input type="text" id="nid" placeholder="Shkruaj NID">

    <button onclick="kerkoID()">
        KËRKO ID E MATURËS
    </button>

    <div id="rezultati"></div>

</div>

<script>

async function kerkoID() {

    const emri = document.getElementById("emri").value.trim();
    const mbiemri = document.getElementById("mbiemri").value.trim();
    const nid = document.getElementById("nid").value.trim();

    const rezultati = document.getElementById("rezultati");

    if(emri === "" || mbiemri === "" || nid === ""){

        rezultati.innerHTML = "Plotësoni të gjitha fushat!";
        return;

    }

    try{

        const response = await fetch("/kerkoID", {

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                emri,
                mbiemri,
                nid
            })

        });

        const data = await response.json();

        if(data.success){

            rezultati.innerHTML = `
                ID e Maturës:
                <br><br>
                ${data.id}
            `;

        }else{

            rezultati.innerHTML = "Të dhënat nuk u gjetën!";

        }

    }catch(error){

        rezultati.innerHTML = "Gabim në server!";

    }

}

</script>

</body>
</html>
